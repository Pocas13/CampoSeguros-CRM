version: '3.9'

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: insureflow
      POSTGRES_PASSWORD: insureflow
      POSTGRES_DB: insureflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  mailpit:
    image: mailpit/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025'
      - '1025:1025'

volumes:
  postgres-data:
